<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="title">Wait for door to open</h1>
     <h1 id="counter">0</h1>

</body>
</html>
<script>
    console.log("start");
    setTimeout(() => {
        document.getElementById("title").innerText = "Maaaaaa, Main ghar aa gaya";
        
    }, 3000);
    setInterval(() => {
        let counter = document.getElementById("counter");
        counter.innerText = parseInt(counter.innerText) + 1;
    }, 1000);
    console.log("end");
</script>
