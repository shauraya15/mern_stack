<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="moviesdb.css">
</head>
<body>
    <div id="container">
        <form id="form">
            <div>
                <label for="movie">Movie image url</label>
                <input id="movie" type="text" placeholder="Enter image url">
            </div>
            <div>
                <label for="title">Movie title</label>
                <input id="title" type="text" placeholder="Enter title">
            </div>
            <div>
                <label for="rating">Movie rating</label>
                <input id="rating" type="text" placeholder="Enter rating">
            </div>
            <div>
                <button id="submit" type="submit">Submit</button>
            </div>
        </form>

        <div id="moviecards"></div>
    </div>

    <script src="moviesdb.js"></script>
</body>
</html>
</html>
